<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">

    <title>Dashbaord</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/main.js"></script>
     
    <h1>Weather Data</h1>

    <div class="section">
        <h3>Select City</h3>
        <div class="selcontainer">
            <input type="radio" name="city" value="all" checked class="citysel"> All    
            <input type="radio" name="city" value="Taipei" class="citysel"> Taipei
            <input type="radio" name="city" value="Taichung" class="citysel"> Taichung
            <input type="radio" name="city" value="Kaohsiung" class="citysel"> Kaohsiung
        </div>
    </div>

    <div class="section">
        <h2>Current Weather</h2>
        <div id="output_currentweather"></div>
    </div>

    <div id="section">
        <h2>Weather Prediction</h2> 
        <div id="output_prediction"></div>
    </div>

    <div class="section">
        <h2>Compare Weather at date</h2>
        <input type="date" id="compare_date"/>
        <div id="output_compare"></div>
    </div>
 
    <div class="section">
        <h2>Previous Weather</h2>
        <div class="chartcont">
            <div>
                <h3>Tempreature in C°</h3>
                <div class="chart-container">
                    <canvas id="temperatureChart"></canvas>
                </div>
            </div>
            <div>
                <h3>Humidity in % </h3>
                <div class="chart-container">
                    <canvas id="humidityChart"></canvas>
                </div>
            </div>
        </div>

        <h3>Temperature and Humidity </h3>
        <div class="chart-container">
            <canvas id="bubbleChart"></canvas>
        </div>
    </div>

    <div>
        <h2>Min, Max, Avg</h2>
        <div id="output_avg"></div>
    </div>
    
</body>
</html>
